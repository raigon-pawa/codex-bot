name: Deploy to NAS

# Runs on a SELF-HOSTED runner installed on the NAS, so nothing is exposed to the
# internet — the runner dials out to GitHub and waits for jobs.
#
# It triggers only after the CI workflow finishes on `main` (workflow_run), and
# only if CI passed. Because workflow_run uses the default branch's copy of this
# file and we filter to `branches: [main]`, CI runs from fork pull requests never
# trigger a deploy — untrusted code never touches your runner.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Never let two deploys rebuild the container at the same time.
concurrency:
  group: deploy-nas
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, nas]
    env:
      # Path to your clone on the NAS (the one holding .env + the volume). Defaults
      # to ~/codex-bot of the runner's user; override by setting a repository
      # variable DEPLOY_PATH (Settings → Secrets and variables → Actions → Variables).
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
    steps:
      - name: Pull latest main and rebuild
        run: |
          set -euo pipefail
          cd "${DEPLOY_PATH:-$HOME/codex-bot}"
          echo "Deploying $(git rev-parse --short origin/main 2>/dev/null || echo '?') in $(pwd)"
          git fetch --prune origin
          git reset --hard origin/main   # match remote exactly; leaves .env (ignored) untouched
          docker compose up -d --build
          docker image prune -f          # drop dangling images from the rebuild
